syntax = "proto3";

package product;

service ProductService {
  rpc CreateProduct (CreateProductRequest) returns (ProductResponse);
  rpc FindAllProducts (Empty) returns (ProductListResponse);
  rpc FindOneProduct (ProductById) returns (ProductResponse);
  rpc UpdateProduct (UpdateProductRequest) returns (ProductResponse);
  rpc DeleteProduct (ProductById) returns (DeleteResponse);
  rpc DecrementStock (DecrementStockRequest) returns (ProductResponse);
}

message Empty {}

message ProductById {
  string id = 1;
}

message CreateProductRequest {
  string name = 1;
  double price = 2;
  int32 stock = 3;
}

message UpdateProductRequest {
  string id = 1;
  string name = 2;
  double price = 3;
  int32 stock = 4;
}

message DecrementStockRequest {
  string id = 1;
  int32 quantity = 2;
}

message ProductResponse {
  string id = 1;
  string name = 2;
  double price = 3;
  int32 stock = 4;
  string createdAt = 5;
}

message ProductListResponse {
  repeated ProductResponse products = 1;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}
